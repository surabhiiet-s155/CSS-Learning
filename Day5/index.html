<!DOCTYPE html>
<html>
<head>
    <title>CSS Day 5 - Display Property</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>CSS Display Property</h1>
    <div class="block">I am Block Element</div>
    <div class="block">Block takes full width</div>
    <span class="inline">I am Inline</span>
    <span class="inline">Inline stays in same line</span>
    <div class="inline-block">Inline-Block 1</div>
    <div class="inline-block">Inline-Block 2</div>
    <div class="hidden">You cannot see me</div>
</body>
</html>
